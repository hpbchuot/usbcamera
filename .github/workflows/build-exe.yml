name: Build Windows EXE

# Build .exe trên Windows runner (PyInstaller KHÔNG cross-compile được từ macOS).
# Kích hoạt khi push lên main, tạo tag v*, hoặc chạy tay từ tab Actions.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE (multi_camera_viewer)
        run: >
          pyinstaller --onefile --noconsole
          --name MultiCameraViewer
          --collect-all cv2_enumerate_cameras
          --collect-all cv2
          multi_camera_viewer.py

      - name: Build EXE (multi_camera_viewer_paired)
        run: >
          pyinstaller --onefile --noconsole
          --name MultiCameraViewerPaired
          --collect-all cv2_enumerate_cameras
          --collect-all cv2
          multi_camera_viewer_paired.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error

      # Khi push tag v* -> tự đính kèm .exe vào GitHub Release
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
